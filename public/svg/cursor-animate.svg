<svg width="209" height="210" viewBox="0 0 209 210" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes cursorMove {
    0%, 100% {
      transform: translate(0px, 0px);
    }
    15% {
      transform: translate(0px, 0px);
    }
    45% {
      transform: translate(35px, 35px);
    }
    85% {
      transform: translate(35px, 35px);
    }
  }
  
  @keyframes selectionGrow {
    0%, 15%, 100% {
      width: 0;
      height: 0;
      opacity: 0;
    }
    20% {
      width: 8px;
      height: 8px;
      opacity: 0.5;
    }
    45% {
      width: 35px;
      height: 35px;
      opacity: 1;
    }
    85% {
      width: 35px;
      height: 35px;
      opacity: 1;
    }
    95% {
      width: 35px;
      height: 35px;
      opacity: 0;
    }
  }
  
  @keyframes selectionFill {
    0%, 15%, 100% {
      width: 0;
      height: 0;
      opacity: 0;
    }
    20% {
      width: 8px;
      height: 8px;
      opacity: 0.05;
    }
    45% {
      width: 35px;
      height: 35px;
      opacity: 0.15;
    }
    85% {
      width: 35px;
      height: 35px;
      opacity: 0.15;
    }
    95% {
      width: 35px;
      height: 35px;
      opacity: 0;
    }
  }
  
  @keyframes cursorClick {
    0%, 100% {
      transform: scale(1);
    }
    10% {
      transform: scale(0.85);
    }
    15% {
      transform: scale(1);
    }
  }
  
  @keyframes cursorGlow {
    0%, 15%, 95%, 100% {
      filter: drop-shadow(0 0 2px rgba(255, 255, 255, 0.4));
    }
    20%, 85% {
      filter: drop-shadow(0 0 4px rgba(74, 158, 255, 0.8));
    }
  }
  
  @keyframes cornerDots {
    0%, 40%, 95%, 100% {
      opacity: 0;
      transform: scale(0);
    }
    48% {
      opacity: 0.7;
      transform: scale(1.2);
    }
    50%, 85% {
      opacity: 1;
      transform: scale(1);
    }
  }
  
  .cursor-group {
    animation: cursorMove 4s ease-in-out infinite;
  }
  
  .cursor-pointer {
    animation: 
      cursorClick 4s ease-in-out infinite,
      cursorGlow 4s ease-in-out infinite;
    transform-origin: 85px 85px;
  }
  
  .selection-box {
    animation: selectionGrow 4s ease-in-out infinite;
  }
  
  .selection-fill {
    animation: selectionFill 4s ease-in-out infinite;
  }
  
  .corner-dot {
    animation: cornerDots 4s ease-in-out infinite;
    transform-origin: center;
  }
</style>

<defs>
  <linearGradient id="cursorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
    <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
  </linearGradient>
</defs>

<!-- Área de selección (fija en x=85, y=85) -->
<g class="selection-area">
  <!-- Relleno de selección -->
  <rect class="selection-fill" x="85" y="85" width="0" height="0" 
        fill="#4A9EFF" opacity="0"/>
  
  <!-- Borde de selección -->
  <rect class="selection-box" x="85" y="85" width="0" height="0" 
        fill="none" stroke="#4A9EFF" stroke-width="2" 
        stroke-dasharray="5 3" opacity="0"/>
  
  <!-- Puntos de esquina -->
  <circle class="corner-dot" cx="85" cy="85" r="3" fill="#4A9EFF" opacity="0"/>
  <circle class="corner-dot" cx="120" cy="85" r="3" fill="#4A9EFF" opacity="0"/>
  <circle class="corner-dot" cx="120" cy="120" r="3" fill="#4A9EFF" opacity="0"/>
  <circle class="corner-dot" cx="85" cy="120" r="3" fill="#4A9EFF" opacity="0"/>
</g>

<!-- Cursor personalizado (se mueve con el grupo) -->
<g class="cursor-group">
  <g class="cursor-pointer">
    <!-- Sombra del cursor -->
    <path d="M 87 87 L 87 107 L 92 102 L 97 112 L 100 111 L 95 101 L 102 101 Z" 
          fill="rgba(0,0,0,0.3)"/>
    
    <!-- Cuerpo principal del cursor -->
    <path d="M 85 85 L 85 105 L 90 100 L 95 110 L 98 109 L 93 99 L 100 99 Z" 
          fill="url(#cursorGrad)" stroke="#333" stroke-width="0.5"/>
    
    <!-- Borde interno para darle profundidad -->
    <path d="M 85 85 L 85 105 L 90 100 L 95 110 L 98 109 L 93 99 L 100 99 Z" 
          fill="none" stroke="white" stroke-width="0.3" opacity="0.6"/>
  </g>
</g>
</svg>